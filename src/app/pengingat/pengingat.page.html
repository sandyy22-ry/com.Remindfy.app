<ion-header [translucent]="true" class="reminder-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="Daftar"></ion-back-button>
    </ion-buttons>

    <ion-buttons slot="end">
      <ion-button fill="clear" color="primary" aria-label="Bagikan">
        <ion-icon name="share-social-outline"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="primary" aria-label="Menu lainnya">
        <ion-icon name="ellipsis-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="reminder-content">
  <div class="reminder-shell">
    <h1>Pengingat</h1>

    <ng-container *ngIf="reminders.length > 0; else emptyState">
      <ion-list lines="none" class="reminder-list">
        <ion-item *ngFor="let reminder of reminders; trackBy: trackByReminderId" class="reminder-item">
          <ion-checkbox
            slot="start"
            class="activity-checkbox"
            [checked]="isReminderDone(reminder)"
            (ionChange)="toggleReminder(reminder.id)"
          ></ion-checkbox>

          <ion-label>
            <div class="activity-title-row">
              <h3 [class.done]="isReminderDone(reminder)">{{ reminder.title }}</h3>
              <ion-badge [color]="isReminderDone(reminder) ? 'success' : isReminderOverdue(reminder) ? 'warning' : 'medium'">
                {{ getStatusLabel(reminder) }}
              </ion-badge>
            </div>
            <p>{{ reminder.time }} · {{ reminder.category || 'Umum' }} <span *ngIf="reminder.notes">• {{ reminder.notes }}</span></p>
            <div class="activity-photo" *ngIf="reminder.photoDataUrl">
              <img [src]="reminder.photoDataUrl || ''" alt="Foto kegiatan {{ reminder.title }}" />
            </div>
          </ion-label>

          <ion-button
            slot="end"
            fill="clear"
            color="danger"
            class="action-delete"
            aria-label="Hapus aktivitas"
            (click)="removeReminder(reminder.id, $event)"
          >
            <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
          </ion-button>
        </ion-item>
      </ion-list>
    </ng-container>

    <ng-template #emptyState>
      <div class="empty-state">
        <p>Tidak Ada Pengingat</p>
      </div>
    </ng-template>
  </div>
</ion-content>

<ion-footer class="add-footer">
  <ion-toolbar>
    <ion-button fill="clear" class="add-button" (click)="openAddModal()">
      <ion-icon slot="start" name="add-circle"></ion-icon>
      Pengingat Baru
    </ion-button>
  </ion-toolbar>
</ion-footer>

<ion-modal
  class="composer-modal"
  [isOpen]="isAddModalOpen"
  (didDismiss)="closeAddModal()"
  [initialBreakpoint]="0.9"
  [breakpoints]="[0, 0.9]"
>
  <ng-template>
    <ion-content class="composer-content">
      <form class="composer-sheet" (ngSubmit)="saveReminder()">
        <header class="composer-head">
          <ion-button fill="clear" color="primary" (click)="closeAddModal()">Batalkan</ion-button>
          <h2>Pengingat Baru</h2>
          <ion-button fill="clear" color="primary" type="submit" [disabled]="!canSave">Tambah</ion-button>
        </header>

        <section class="composer-card text-card">
          <ion-item lines="none" class="modal-input">
            <ion-input name="title" placeholder="Judul" [(ngModel)]="form.title"></ion-input>
          </ion-item>

          <ion-item lines="full" class="modal-input note-input">
            <ion-input name="notes" placeholder="Catatan" [(ngModel)]="form.notes"></ion-input>
          </ion-item>
        </section>

        <section class="composer-card row-card">
          <ion-item lines="none" class="line-item">
            <ion-label>Detail</ion-label>
            <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
          </ion-item>
        </section>

        <section class="composer-card row-card">
          <ion-item lines="none" class="line-item">
            <div class="list-icon" slot="start">
              <ion-icon name="list-outline"></ion-icon>
            </div>
            <ion-label>Daftar</ion-label>
            <span slot="end" class="list-name">Pengingat</span>
            <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
          </ion-item>
        </section>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>
